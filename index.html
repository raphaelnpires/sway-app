<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sway - Discover What Moves You</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 600px;
            padding: 40px 24px;
            text-align: center;
        }
        .logo-img {
            max-width: 280px;
            height: auto;
            margin-bottom: 8px;
        }
        .tagline {
            font-size: 18px;
            color: #a0a0b0;
            margin-bottom: 48px;
        }
        .badge {
            display: inline-block;
            background: linear-gradient(135deg, #ff6b6b, #ff4757);
            color: white;
            padding: 12px 32px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 48px;
            text-decoration: none;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
        }
        .links a {
            color: #ff6b6b;
            text-decoration: none;
            font-size: 16px;
            transition: opacity 0.2s;
        }
        .links a:hover {
            opacity: 0.8;
            text-decoration: underline;
        }
        .footer {
            margin-top: 64px;
            font-size: 13px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="SwayLogo.png" alt="Sway" class="logo-img">
        <p class="tagline">Discover what moves you</p>

        <span class="badge">Coming Soon to the App Store</span>

        <nav class="links">
            <a href="privacy-policy.html">Privacy Policy</a>
            <a href="terms-of-service.html">Terms of Service</a>
            <a href="support.html">Support & FAQ</a>
        </nav>

        <p class="footer">&copy; 2026 Sway. All rights reserved.</p>
    </div>
</body>
</html>
